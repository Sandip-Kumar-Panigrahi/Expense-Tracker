<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — The Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #11161c; --surface: #1a212b; --surface-2: #222b36; --surface-3: #2a3441;
    --ink: #e8ecef; --ink-dim: #8b97a6; --ink-faint: #5a6573;
    --gold: #d4a857; --gold-dim: #8a7140; --fall: #d9685c; --rise: #4fae7c;
    --line: #2b3440;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: var(--bg);
    background-image: radial-gradient(ellipse 900px 500px at 10% -10%, rgba(212,168,87,0.07), transparent),
                       radial-gradient(ellipse 700px 500px at 100% 10%, rgba(79,174,124,0.05), transparent);
    color: var(--ink); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
  }
  .card{
    width: 100%; max-width: 380px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 12px; padding: 34px 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .mark{
    font-family:'Fraunces', serif; font-weight: 600; font-size: 12px; letter-spacing: 0.16em;
    color: var(--gold); border: 1px solid var(--gold-dim); border-radius: 100px;
    padding: 4px 10px; text-transform: uppercase; display:inline-block; margin-bottom: 14px;
  }
  h1{ font-family:'Fraunces', serif; font-weight:700; font-size: 26px; margin: 0 0 6px; }
  p.sub{ color: var(--ink-dim); font-size: 13.5px; margin: 0 0 26px; }
  .field{ margin-bottom: 16px; display:flex; flex-direction: column; gap: 6px; }
  .field label{ font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint); }
  .field input{
    background: var(--surface-3); border: 1px solid var(--line); color: var(--ink);
    border-radius: 7px; padding: 11px 12px; font-size: 14.5px; font-family: 'Inter', sans-serif;
  }
  .field input:focus{ outline: 2px solid var(--gold); outline-offset: 1px; }
  .btn{
    width: 100%; background: var(--gold); color: #1a1305; border: none; border-radius: 7px;
    padding: 12px 14px; font-size: 14.5px; font-weight: 700; cursor: pointer; margin-top: 6px;
  }
  .btn:hover{ background: #e3b765; }
  .msg{
    font-size: 13px; border-radius: 8px; padding: 10px 12px; margin-bottom: 18px;
  }
  .msg.error{ background: rgba(217,104,92,0.12); color: var(--fall); border: 1px solid rgba(217,104,92,0.3); }
  .msg.success{ background: rgba(79,174,124,0.12); color: var(--rise); border: 1px solid rgba(79,174,124,0.3); }
  .footer-link{ margin-top: 20px; text-align:center; font-size: 13px; color: var(--ink-dim); }
  .footer-link a{ color: var(--gold); text-decoration: none; font-weight: 600; }
  .footer-link a:hover{ text-decoration: underline; }
</style>
</head>
<body>
  <div class="card">
    <span class="mark">The Ledger</span>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to see your expenses.</p>

    <div class="msg error" th:if="${param.error}">Incorrect username or password. Try again.</div>
    <div class="msg success" th:if="${param.registered}">Account created — sign in below.</div>
    <div class="msg success" th:if="${param.logout}">You've been signed out.</div>

    <form method="post" th:action="@{/login}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button class="btn" type="submit">Sign in</button>
    </form>

    <div class="footer-link">
      New here? <a th:href="@{/register}">Create an account</a>
    </div>
  </div>
</body>
</html>
