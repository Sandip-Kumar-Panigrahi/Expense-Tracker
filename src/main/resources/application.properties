# ---------------------------------------------------------------
# Server
# ---------------------------------------------------------------
server.port=${PORT:8080}

# ---------------------------------------------------------------
# Database: H2, a real embedded SQL database, stored as a file on disk.
# No separate database server to install — the .mv.db file under
# ./data is your database. Data survives restarts.
#
# To switch to MySQL or PostgreSQL instead, see the "Switching to
# a different database" section in README.md.
# ---------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/ledgerdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# "update" auto-creates/updates tables to match the @Entity classes on startup.
# Fine for a personal project; for production you'd normally use a migration
# tool like Flyway or Liquibase instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Optional built-in DB browser UI, visit http://localhost:8080/h2-console
# JDBC URL to paste in: jdbc:h2:file:./data/ledgerdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Serialize dates as "2026-06-30", not as timestamps/arrays
spring.jackson.serialization.write-dates-as-timestamps=false
